<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1.25rem; }
    h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; color: #fff; }
    h1 span { color: #5b8ff9; }
    #drop-zone { border: 1.5px dashed #2e2e2e; border-radius: 12px; padding: 2.5rem; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #5b8ff9; background: #141414; }
    #drop-zone input { display: none; }
    #drop-zone .icon { font-size: 32px; margin-bottom: 10px; }
    #drop-zone p { font-size: 14px; color: #888; }
    #drop-zone p strong { color: #ccc; font-weight: 500; }
    #file-info { font-size: 13px; color: #666; display: none; }
    #player { display: none; flex-direction: column; gap: 1rem; }
    .card { background: #161616; border: 0.5px solid #222; border-radius: 10px; padding: 1rem 1.25rem; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 16px; border-radius: 8px; border: 0.5px solid #2e2e2e; background: #1e1e1e; color: #e8e8e8; font-size: 13px; cursor: pointer; transition: background 0.1s; }
    button:hover:not(:disabled) { background: #252525; border-color: #444; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.primary { background: #5b8ff9; border-color: #5b8ff9; color: #fff; font-weight: 500; }
    button.primary:hover:not(:disabled) { background: #4a7de8; }
    select { padding: 7px 10px; border-radius: 8px; border: 0.5px solid #2e2e2e; background: #1e1e1e; color: #e8e8e8; font-size: 13px; cursor: pointer; }
    .speed-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #777; }
    input[type=range] { -webkit-appearance: none; width: 120px; height: 4px; border-radius: 4px; background: #2e2e2e; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #5b8ff9; cursor: pointer; }
    #speed-val { color: #ccc; font-weight: 500; min-width: 32px; }
    #progress-wrap { height: 3px; background: #222; border-radius: 4px; overflow: hidden; }
    #progress-bar { height: 100%; background: #5b8ff9; width: 0%; transition: width 0.4s; }
    #status { font-size: 12px; color: #555; min-height: 16px; margin-top: 8px; }
    .section-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 8px; }
    #paragraph-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; scrollbar-color: #2e2e2e transparent; }
    .para-item { font-size: 13px; color: #666; padding: 7px 10px; border-radius: 6px; cursor: pointer; line-height: 1.5; transition: background 0.1s; border: 0.5px solid transparent; }
    .para-item:hover { background: #1e1e1e; color: #aaa; }
    .para-item.active { background: #0f1e3d; color: #5b8ff9; border-color: #1a3060; }
    .para-item.done { color: #333; }
    .para-item.type-titulo { font-size: 13px; font-weight: 500; color: #888; border-left: 2px solid #2e2e2e; padding-left: 8px; }
    .para-item.type-titulo.active { color: #5b8ff9; border-left-color: #5b8ff9; }
    .para-item.type-subtitulo { font-style: italic; color: #555; }
    #audio-player { width: 100%; border-radius: 8px; display: none; margin-top: 8px; outline: none; }
    #loading-container { display: none; align-items: center; gap: 10px; }
    #spinner { width: 18px; height: 18px; border: 2px solid #2e2e2e; border-top-color: #5b8ff9; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 12px; color: #555; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 0.5px solid #333; color: #ccc; font-size: 13px; padding: 8px 18px; border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="container">
  <h1>PDF <span>Reader</span></h1>


  <!-- Banner de doação -->
  <div id="pix-banner" style="background:#161616;border:0.5px solid #222;border-radius:10px;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div style="font-size:13px;color:#888;">Apoie o projeto — <span style="color:#e8e8e8;font-weight:500;">doe via Pix</span></div>
    <button onclick="copiarPix()" id="btn-pix" style="padding:6px 14px;border-radius:8px;border:0.5px solid #2e2e2e;background:#1e1e1e;color:#e8e8e8;font-size:12px;cursor:pointer;white-space:nowrap;">Pix copia e cola</button>
  </div>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="application/pdf" />
    <div class="icon">/</div>
    <p><strong>Clique para selecionar</strong> ou arraste um PDF aqui</p>
  </div>

  <div id="file-info"></div>
  <div id="loading-container">
    <div id="spinner"></div>
    <div id="loading-text">Processando PDF...</div>
  </div>

  <div id="player">
    <div class="card">
      <div id="progress-wrap"><div id="progress-bar"></div></div>
      <div class="controls" style="margin-top:1rem;">
        <button class="primary" id="btn-play" onclick="play()">▶ Reproduzir</button>
        <button id="btn-stop" onclick="stopAll(true)" disabled>⏹ Parar</button>
        <select id="voice-select" onchange="restartCurrentParagraph()">
          <option value="pt-BR-ThalitaMultilingualNeural">Thalita (pt-BR ♀)</option>
          <option value="pt-BR-FranciscaNeural">Francisca (pt-BR ♀)</option>
          <option value="pt-BR-AntonioNeural">Antonio (pt-BR ♂)</option>
          <option value="pt-PT-DuarteNeural">Duarte (pt-PT ♂)</option>
          <option value="pt-PT-RaquelNeural">Raquel (pt-PT ♀)</option>
        </select>
      </div>
      <div class="speed-row" style="margin-top:1rem;">
        <span>Velocidade</span>
        <input type="range" id="speed" min="-50" max="100" step="10" value="0" oninput="onSpeedChange()"/>
        <span id="speed-val">0%</span>
      </div>
      <audio id="audio-player" controls></audio>
      <div id="status">Selecione um parágrafo ou clique em Reproduzir.</div>
    </div>
    <div class="card">
      <div class="section-label">Parágrafos</div>
      <div id="paragraph-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const API_URL = '';

// Estado agrupado para facilitar a manutenção
const QUEUE_SIZE = 3; // quantos blobs pré-renderizar à frente

const state = {
  paragraphs: [],
  currentIdx: 0,
  isPlaying: false,
  audioQueue: [],        // fila de blobs pré-renderizados
  queueAborts: [],       // AbortControllers da fila
  sessionId: 0,
  activeFetchAbort: null
};

// ── Elementos DOM principais ─────────────────────────────
const DOM = {
  dz: document.getElementById('drop-zone'),
  fileInput: document.getElementById('file-input'),
  fileInfo: document.getElementById('file-info'),
  player: document.getElementById('player'),
  loading: document.getElementById('loading-container'),
  loadingText: document.getElementById('loading-text'),
  paraList: document.getElementById('paragraph-list'),
  audio: document.getElementById('audio-player'),
  btnPlay: document.getElementById('btn-play'),
  btnStop: document.getElementById('btn-stop'),
  progressBar: document.getElementById('progress-bar'),
  status: document.getElementById('status'),
  speedSlider: document.getElementById('speed'),
  speedVal: document.getElementById('speed-val'),
  voiceSelect: document.getElementById('voice-select')
};

// ── Drag & drop ──────────────────────────────────────────
DOM.dz.addEventListener('dragover', e => { e.preventDefault(); DOM.dz.classList.add('drag-over'); });
DOM.dz.addEventListener('dragleave', () => DOM.dz.classList.remove('drag-over'));
DOM.dz.addEventListener('drop', e => { 
  e.preventDefault(); 
  DOM.dz.classList.remove('drag-over'); 
  handleFile(e.dataTransfer.files[0]); 
});
DOM.fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

// ── Carregar PDF ─────────────────────────────────────────
async function handleFile(file) {
  if (!file || file.type !== 'application/pdf') return;
  stopAll(true);

  DOM.fileInfo.style.display = 'block';
  DOM.fileInfo.textContent = '/' + file.name;
  DOM.player.style.display = 'none';
  DOM.loading.style.display = 'flex';
  DOM.loadingText.textContent = 'Processando PDF...';

  try {
    const formData = new FormData();
    formData.append('file', file);
    
    const res = await fetch(`${API_URL}/extract`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error();
    
    const data = await res.json();
    state.paragraphs = data.paragraphs;
    renderList();
    
    DOM.loading.style.display = 'none';
    DOM.player.style.display = 'flex';
    setStatus(`${state.paragraphs.length} blocos encontrados. Pronto para reproduzir.`);
  } catch(e) {
    DOM.loading.style.display = 'none';
    showToast('Erro ao extrair PDF. O backend está rodando?');
  }
}

// ── Lista de parágrafos ──────────────────────────────────
function renderList() {
  DOM.paraList.innerHTML = '';
  state.paragraphs.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = `para-item type-${p.type || 'paragrafo'}`;
    d.id = 'para-' + i;
    d.textContent = p.text.substring(0, 120) + (p.text.length > 120 ? '…' : '');
    d.title = p.text;
    d.onclick = () => jumpTo(i);
    DOM.paraList.appendChild(d);
  });
}

// ── Funcões de Cancelamento Global ───────────────────────
function cancelAllFetches() {
  // aborta todos os pre-renders em andamento
  state.queueAborts.forEach(ctrl => ctrl.abort());
  state.queueAborts = [];
  state.audioQueue = [];

  if (state.activeFetchAbort) {
    state.activeFetchAbort.abort();
    state.activeFetchAbort = null;
  }
}

// ── Navegação ───────────────────────────────────────────
function jumpTo(idx) {
  state.sessionId++; // ISSO É A CHAVE: Mata o loop anterior instantaneamente
  cancelAllFetches(); // Aborta conexões com o backend
  stopAudio();
  
  state.currentIdx = idx;
  
  if (state.isPlaying) {
    resumeFrom(idx);
  } else {
    setActive(idx);
    setStatus(`Posicionado no bloco ${idx + 1}. Clique em Reproduzir.`);
  }
}

function stopAudio() {
  DOM.audio.pause();
  DOM.audio.removeAttribute('src'); // Força a liberação da memória do blob anterior
  DOM.audio.load();
}

async function resumeFrom(idx) {
  const sid = state.sessionId;
  state.currentIdx = idx;
  
  try {
    for (; state.currentIdx < state.paragraphs.length; state.currentIdx++) {
      if (!state.isPlaying || state.sessionId !== sid) break;
      
      setActive(state.currentIdx);
      setStatus(`Lendo bloco ${state.currentIdx + 1} de ${state.paragraphs.length}...`);
      
      await playParagraph(state.currentIdx, sid);
      if (state.sessionId !== sid) break;
    }
    
    if (state.sessionId === sid && state.currentIdx >= state.paragraphs.length) {
      setStatus('Leitura concluída.');
      document.querySelectorAll('.para-item').forEach(el => el.classList.add('done'));
      DOM.progressBar.style.width = '100%';
      state.currentIdx = 0;
      state.isPlaying = false;
      DOM.btnPlay.disabled = false;
      DOM.btnStop.disabled = true;
    }
  } catch(e) {
    if (state.sessionId === sid && e.name !== 'AbortError') {
      setStatus('Erro.'); 
      showToast('Verifique o backend.');
      state.isPlaying = false;
      DOM.btnPlay.disabled = false;
      DOM.btnStop.disabled = true;
    }
  }
}

function setActive(i) {
  document.querySelectorAll('.para-item').forEach((el, idx) => {
    el.classList.remove('active');
    if (idx < i) el.classList.add('done'); else el.classList.remove('done');
  });
  
  const el = document.getElementById('para-' + i);
  if (el) { 
    el.classList.add('active'); 
    el.scrollIntoView({ behavior: 'smooth', block: 'center' }); // Centraliza melhor a visualização
  }
  
  const pct = state.paragraphs.length > 0 ? Math.round((i / state.paragraphs.length) * 100) : 0;
  DOM.progressBar.style.width = pct + '%';
}

// ── Controles de Áudio ───────────────────────────────────
function onSpeedChange() {
  const val = parseInt(DOM.speedSlider.value);
  DOM.speedVal.textContent = (val > 0 ? '+' : '') + val + '%';
  DOM.audio.playbackRate = Math.max(0.5, Math.min(2.0, 1 + val / 100));
}

function restartCurrentParagraph() {
  if (!state.isPlaying) return;
  cancelAllFetches();
  const idx = state.currentIdx;
  stopAudio();
  resumeFrom(idx);
}

// ── Fetch e Pre-render ───────────────────────────────────
async function fetchAudio(item, voice, signal) {
  const res = await fetch(`${API_URL}/tts`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      paragraphs: [item.text],
      types: [item.type || 'paragrafo'],
      start_index: 0, 
      voice, 
      rate: "+0%" // Deixa o backend neutro para evitar duplo aceleramento
    }),
    signal
  });
  
  if (!res.ok) throw new Error('Erro no servidor');
  
  const reader = res.body.getReader();
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  return new Blob(chunks, { type: 'audio/mpeg' });
}

async function preRenderQueue(sid) {
  // pré-renderiza os próximos QUEUE_SIZE parágrafos em paralelo
  const voice = DOM.voiceSelect.value;

  for (let offset = 1; offset <= QUEUE_SIZE; offset++) {
    const nextIdx = state.currentIdx + offset;
    if (nextIdx >= state.paragraphs.length) break;
    if (state.audioQueue[offset - 1]) continue; // já tem na fila

    const ctrl = new AbortController();
    state.queueAborts[offset - 1] = ctrl;

    fetchAudio(state.paragraphs[nextIdx], voice, ctrl.signal)
      .then(blob => {
        if (!ctrl.signal.aborted && state.sessionId === sid) {
          state.audioQueue[offset - 1] = blob;
        }
      })
      .catch(e => {
        if (e.name !== 'AbortError') state.audioQueue[offset - 1] = null;
      });
  }
}

// ── Tocar Parágrafo ──────────────────────────────────────
async function playParagraph(idx, sid) {
  const voice = DOM.voiceSelect.value;

  // pega o primeiro da fila se disponível
  let blob = state.audioQueue.shift() || null;
  state.queueAborts.shift();

  if (!blob) {
    setStatus(`Gerando áudio... bloco ${idx + 1}`);
    state.activeFetchAbort = new AbortController();
    try {
      blob = await fetchAudio(state.paragraphs[idx], voice, state.activeFetchAbort.signal);
    } catch(e) {
      if (e.name === 'AbortError') return;
      throw e;
    } finally {
      state.activeFetchAbort = null;
    }
  }

  if (state.sessionId !== sid) return;

  const url = URL.createObjectURL(blob);
  DOM.audio.src = url;
  DOM.audio.style.display = 'block';

  const speedVal = parseInt(DOM.speedSlider.value);
  DOM.audio.playbackRate = Math.max(0.5, Math.min(2.0, 1 + speedVal / 100));

  // dispara pré-render da fila enquanto toca
  preRenderQueue(sid);

  await DOM.audio.play();

  return new Promise((resolve, reject) => {
    const onEnded = () => { cleanup(); resolve(); };
    const onError = (e) => { cleanup(); reject(e); };
    const cleanup = () => {
      DOM.audio.removeEventListener('ended', onEnded);
      DOM.audio.removeEventListener('error', onError);
      URL.revokeObjectURL(url);
    };
    DOM.audio.addEventListener('ended', onEnded);
    DOM.audio.addEventListener('error', onError);
  });
}

// ── Ações de Controle ────────────────────────────────────
async function play() {
  if (state.isPlaying || state.paragraphs.length === 0) return;
  state.isPlaying = true;
  state.sessionId++;
  DOM.btnPlay.disabled = true;
  DOM.btnStop.disabled = false;
  await resumeFrom(state.currentIdx);
}

function stopAll(resetIdx = true) {
  state.sessionId++;
  state.isPlaying = false;
  cancelAllFetches();
  stopAudio();
  
  if (resetIdx) {
    state.currentIdx = 0;
    DOM.progressBar.style.width = '0%';
  }
  
  DOM.btnPlay.disabled = false;
  DOM.btnStop.disabled = true;
  document.querySelectorAll('.para-item').forEach(el => el.classList.remove('active', 'done'));
  
  if (state.paragraphs.length > 0) setStatus('Pronto para reproduzir.');
}

function setStatus(msg) { DOM.status.textContent = msg; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function copiarPix() {
  const chave = '00020126580014br.gov.bcb.pix0136746a4b78-059c-423b-960a-4a13db0baa9e5204000053039865802BR5915TOMLEMEPATIENCE6009Sao Paulo610901227-20062240520daqr128062888063027063046DBB';
  navigator.clipboard.writeText(chave).then(() => {
    const btn = document.getElementById('btn-pix');
    btn.textContent = '✓ Copiado!';
    btn.style.color = '#5b8ff9';
    setTimeout(() => { btn.textContent = 'Pix copia e cola'; btn.style.color = '#e8e8e8'; }, 2000);
  });
}

</script>
</body>
</html>
